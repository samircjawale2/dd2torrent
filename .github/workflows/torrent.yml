name: Create torrent
on:
  push:
    branches:
      - master
      
env:
  name: "gta"
  comment: "gta"
  url: "https://fafda.to/d/798s0sck9y6i?v=i4lI1nwnIJpACL52AuANUyzbd9UheuQg8T1OwwNJflgWVe0AToMXaK-8QrxCNwf61s36bFzfSgiCYf4G6H0pj_91gMu7N_0dWhrJydWZOwc0u1x_oWgHildYw8LeMlTti66hb1sdfLqZNpKGlwa0IG3hf3IacoLNGTnlWKn8Wz0n2nuyMsgo4uxgSvg0ZKyZ1JYRK4tCCdjQAwGyrmn6Ttfp8U80Ai-EW2m24XA"
  file_name: "gtag0ZKyZ1JYRK4tCCdjQAwGyrmn6Ttfp8U80Ai-EW2m24XA"
  piece_size: 19 # Check the README.md for recommended piece size
      
jobs:
  create:
    runs-on: ubuntu-20.04
    steps:
      - name: Install mktorrent
        run: sudo apt-get install mktorrent
        
      - name: Download file
        run: wget -nv -O "$file_name" "$url"
        
      - name: Create torrent using mktorrent
        run: mktorrent -c "$comment" -l $piece_size -o "${name}.torrent" -w "$url" "$file_name"
        
      - name: Upload torrent file
        uses: actions/upload-artifact@v2
        with:
          name: ${{ env.name }}
          path: ${{ env.name }}.torrent
